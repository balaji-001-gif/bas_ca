{% extends "templates/web.html" %}

{% block header %}
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script id="tailwind-config">
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    "primary": "#320075",
                    "primary-container": "#4a1d96",
                    "background": "#faf8ff",
                    "on-surface": "#131b2e",
                },
                fontFamily: {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                }
            }
        }
    }
</script>
<style>
    .navbar, footer { display: none !important; }
    #page-content { padding: 0 !important; margin: 0 !important; max-width: 100% !important; }
</style>
{% endblock %}

{% block page_content %}
<div class="min-h-screen bg-background flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <span class="material-symbols-outlined text-primary text-5xl mb-4">account_balance</span>
        <h2 class="text-3xl font-extrabold text-primary tracking-tight font-headline">Financial Vanguard</h2>
        <p class="mt-2 text-sm text-slate-600 font-body">Client Compliance Portal Login</p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow-xl rounded-2xl sm:px-10 border border-slate-100">
            <form class="space-y-6" id="login-form">
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700">Email Address</label>
                    <div class="mt-1">
                        <input id="usr" name="usr" type="text" required class="appearance-none block w-full px-3 py-2 border border-slate-300 rounded-xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                    <div class="mt-1">
                        <input id="pwd" name="pwd" type="password" required class="appearance-none block w-full px-3 py-2 border border-slate-300 rounded-xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember_me" name="remember_me" type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-slate-300 rounded">
                        <label for="remember_me" class="ml-2 block text-sm text-slate-900">Remember me</label>
                    </div>

                    <div class="text-sm">
                        <a href="/forgot-password" class="font-medium text-primary hover:text-primary-container">Forgot password?</a>
                    </div>
                </div>

                <div>
                    <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-primary hover:bg-primary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200">
                        Sign in to Dashboard
                    </button>
                </div>
            </form>
            
            <div class="mt-6">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-200"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-slate-500">Need Help?</span>
                    </div>
                </div>
                <div class="mt-6 text-center">
                    <p class="text-xs text-slate-400">Contact your Relationship Manager or call +91 (Firm Number)</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const usr = document.getElementById('usr').value;
        const pwd = document.getElementById('pwd').value;
        
        frappe.call({
            method: "frappe.auth.login",
            args: {
                usr: usr,
                pwd: pwd
            },
            callback: function(r) {
                if(r.message == "Logged In") {
                    window.location.href = "/bas-ca-portal";
                }
            }
        });
    });
</script>
{% endblock %}
