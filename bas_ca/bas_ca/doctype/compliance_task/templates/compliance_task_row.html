<!-- Financial Vanguard Theme: Compliance Task Row -->
<div class="group relative bg-surface-container-lowest rounded-xl p-4 flex items-center gap-4 transition-all duration-200 active:scale-[0.98] shadow-sm hover:shadow-md border-b-2 border-transparent hover:border-primary/10"
     onclick="window.location.href='/compliance-tasks/{{ doc.name }}'">
    <!-- Icon / Status Indicator -->
    <div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center text-primary relative">
        <span class="material-symbols-outlined">assignment_turned_in</span>
    </div>
    <!-- Content Logic -->
    <div class="flex-1 min-w-0">
        <div class="flex items-center justify-between mb-1">
            <h3 class="text-on-surface font-semibold truncate text-sm md:text-base leading-tight">
                {{ doc.task_name }}
            </h3>
            <!-- Status Badge Logic -->
            {% if doc.status == 'Filed' %}
            <span class="px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-800 text-[10px] font-bold tracking-wider uppercase">
                Completed
            </span>
            {% elif doc.status == 'Pending' %}
            <span class="px-2 py-0.5 rounded-full bg-on-tertiary-container/20 text-on-tertiary-container text-[10px] font-bold tracking-wider uppercase">
                Pending
            </span>
            {% else %}
            <span class="px-2 py-0.5 rounded-full bg-error-container text-on-error-container text-[10px] font-bold tracking-wider uppercase">
                Attention
            </span>
            {% endif %}
        </div>
        <div class="flex items-center gap-3 text-on-surface-variant text-[12px]">
            <span class="flex items-center gap-1">
                <span class="material-symbols-outlined text-[14px]">event</span>
                Due: {{ frappe.format_date(doc.due_date) }}
            </span>
            <span class="w-1 h-1 rounded-full bg-outline-variant"></span>
            <span class="font-medium">Ref: #{{ doc.name[-6:] }}</span>
        </div>
    </div>
    <!-- Trailing Action -->
    <div class="flex items-center justify-center text-outline-variant group-hover:text-primary transition-colors">
        <span class="material-symbols-outlined">chevron_right</span>
    </div>
</div>
