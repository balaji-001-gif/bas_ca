<!-- Compliance Task Portal List Row -->
<div class="glass-card stat-card" style="margin-bottom: 10px; padding: 1rem; cursor: pointer;" 
     onclick="window.location.href='/compliance-tasks/{{ doc.name }}'">
    <div class="stat-icon {% if doc.status == 'Filed' %}bg-success{% elif doc.status == 'Overdue' %}bg-danger{% else %}bg-warning{% endif %}" 
         style="width: 2.5rem; height: 2.5rem; font-size: 1rem;">
        <i class="fa fa-check-square-o"></i>
    </div>
    <div class="item-main" style="flex: 1;">
        <div class="item-title" style="font-size: 1.1rem;">{{ doc.task_name }}</div>
        <div class="item-subtitle">Due Date: {{ frappe.format_date(doc.due_date) }}</div>
    </div>
    <div style="text-align: right;">
        <span class="badge-round {% if doc.status == 'Filed' %}badge-success{% elif doc.status == 'Pending' %}badge-warning{% else %}badge-danger{% endif %}">
            {{ doc.status }}
        </span>
        {% if doc.attachment %}
        <div style="margin-top: 5px;">
            <a href="{{ doc.attachment }}" target="_blank" style="font-size: 12px; color: var(--brand-primary);">
                <i class="fa fa-download"></i> Receipt
            </a>
        </div>
        {% endif %}
    </div>
</div>
