<!-- ROC Filing Portal List Row -->
<div class="glass-card stat-card" style="margin-bottom: 10px; padding: 1rem; cursor: pointer;" 
     onclick="window.location.href='/roc-filings/{{ doc.name }}'">
    <div class="stat-icon bg-secondary" style="width: 2.5rem; height: 2.5rem; font-size: 1rem; background: #9333ea;">
        <i class="fa fa-building-o"></i>
    </div>
    <div class="item-main" style="flex: 1;">
        <div class="item-title" style="font-size: 1.1rem;">Form {{ doc.form_name or 'ROC Filing' }}</div>
        <div class="item-subtitle">Proposed: {{ frappe.format_date(doc.filing_date) }}</div>
    </div>
    <div style="text-align: right;">
        <span class="badge-round {% if doc.status == 'Filed' %}badge-success{% elif doc.status == 'Pending' %}badge-warning{% else %}badge-danger{% endif %}">
            {{ doc.status }}
        </span>
        {% if doc.ccfs_2026_applicable %}
        <div style="margin-top: 5px; font-size: 11px; color: var(--brand-primary); font-weight: 600;">
            <i class="fa fa-star"></i> CCFS-2026
        </div>
        {% endif %}
    </div>
</div>
