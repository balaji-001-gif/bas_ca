<!-- GST Return Tracker Portal List Row -->
<div class="glass-card stat-card" style="margin-bottom: 10px; padding: 1rem; cursor: pointer;" 
     onclick="window.location.href='/gst-returns/{{ doc.name }}'">
    <div class="stat-icon bg-primary" style="width: 2.5rem; height: 2.5rem; font-size: 1rem;">
        <i class="fa fa-percent"></i>
    </div>
    <div class="item-main" style="flex: 1;">
        <div class="item-title" style="font-size: 1.1rem;">{{ doc.return_type }} - {{ doc.filing_period }}</div>
        <div class="item-subtitle">Due: {{ frappe.format_date(doc.due_date) }} | FY: {{ doc.financial_year }}</div>
    </div>
    <div style="text-align: right;">
        <span class="badge-round {% if doc.status == 'Filed' %}badge-success{% elif doc.status == 'Pending' %}badge-warning{% else %}badge-danger{% endif %}">
            {{ doc.status }}
        </span>
        {% if doc.itc_difference and doc.itc_difference != 0 %}
        <div style="margin-top: 5px; font-size: 11px; color: var(--accent-danger);">
            <i class="fa fa-exclamation-triangle"></i> ITC Mismatch
        </div>
        {% endif %}
    </div>
</div>
